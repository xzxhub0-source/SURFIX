name: Update SURFIX Sources

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:  # Manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: |
        cd backend
        npm install
    
    - name: Run scraper
      env:
        MONGODB_URI: ${{ secrets.MONGODB_URI }}
        TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
      run: |
        cd backend
        node src/scrapers/sourceScraper.js
